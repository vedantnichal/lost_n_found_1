{% extends "base.html" %}

{% block title %}Complete Profile - 🔗 LostLinks{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="bg-white rounded-[24px] shadow-xl p-8 md:p-12 w-full max-w-md border border-slate-100">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800 mb-2" id="additional-title">Complete Profile</h1>
      <p class="text-slate-500 font-medium">Please provide additional details to complete your registration</p>
    </div>

    <form action="{{ url_for('additional_info') }}" method="POST" id="additional-info-form" novalidate class="space-y-6">
      <!-- Display Name Input -->
      <div>
        <label for="displayName" class="block text-sm font-semibold text-slate-700 mb-2" id="label-displayname">Display Name</label>
        <input 
          type="text" 
          name="displayName" 
          id="displayName" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" 
          placeholder="Your full name" 
          required 
          autocomplete="name"
          aria-labelledby="label-displayname"
        >
      </div>

      <!-- Contact Number Input -->
      <div>
        <label for="contactNumber" class="block text-sm font-semibold text-slate-700 mb-2" id="label-contactnumber">Contact Number (Optional)</label>
        <input 
          type="tel" 
          name="contactNumber" 
          id="contactNumber" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" 
          placeholder="e.g. +91 98765 43210" 
          autocomplete="tel"
          aria-labelledby="label-contactnumber"
        >
      </div>

      <!-- Submit Button -->
      <button type="submit" class="w-full bg-primary hover:bg-indigo-600 text-white font-bold rounded-xl px-4 py-3 shadow-md shadow-indigo-200 transition" id="additional-submit-btn">
        Complete Registration
      </button>
    </form>
  </div>
</div>
{% endblock %}
