{% extends "base.html" %}

{% block title %}Reset Password - 🔗 LostLinks{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="bg-white rounded-[24px] shadow-xl p-8 md:p-12 w-full max-w-md border border-slate-100">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800 mb-2" id="forgot-title">Reset Password</h1>
      <p class="text-slate-500 font-medium">We'll send a password recovery link to your email</p>
    </div>

    <form action="{{ url_for('forgot_password') }}" method="POST" id="forgot-form" novalidate class="space-y-6">
      <!-- Email Input -->
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2" id="label-email">Email Address</label>
        <input 
          type="email" 
          name="email" 
          id="email" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" 
          placeholder="name@iitbhilai.ac.in" 
          required 
          autocomplete="email"
          aria-labelledby="label-email"
        >
      </div>

      <!-- Submit Button -->
      <button type="submit" class="w-full bg-primary hover:bg-indigo-600 text-white font-bold rounded-xl px-4 py-3 shadow-md shadow-indigo-200 transition" id="forgot-submit-btn">
        Send Recovery Link
      </button>
    </form>

    <div class="text-center mt-6 text-slate-500 font-medium text-sm">
      <p>Remember your password? <a href="{{ url_for('login') }}" class="text-primary hover:text-indigo-700 font-bold transition" id="login-link">Sign In</a></p>
    </div>
  </div>
</div>
{% endblock %}
