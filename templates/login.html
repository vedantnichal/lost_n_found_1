{% extends "base.html" %}

{% block title %}Sign In - 🔗 LostLinks{% endblock %}

{% block content %}
<div class="relative w-full flex items-center justify-center min-h-[70vh] rounded-[32px]">
  <!-- Decorative background text -->
  <div class="absolute inset-0 hidden sm:block pointer-events-none select-none z-0 overflow-hidden rounded-[32px]">
    <div class="absolute top-1/2 right-[calc(50%+14rem)] lg:right-[calc(50%+16rem)] -translate-y-1/2">
      <span
        class="text-[6vw] lg:text-[7vw] xl:text-[7rem] font-black text-slate-900/[0.06] tracking-tighter whitespace-nowrap">
        LOST
      </span>
    </div>
    <div class="absolute top-1/2 left-[calc(50%+14rem)] lg:left-[calc(50%+16rem)] -translate-y-1/2">
      <span
        class="text-[6vw] lg:text-[7vw] xl:text-[7rem] font-black text-slate-900/[0.06] tracking-tighter whitespace-nowrap">
        LINKS
      </span>
    </div>
  </div>

  <div class="animate-fade-in-up bg-white/80 backdrop-blur-2xl rounded-[24px] shadow-2xl shadow-slate-200/50 p-8 md:p-12 w-full max-w-md border border-white/50 relative z-10">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800 mb-2" id="login-title">Sign In</h1>
      <p class="text-slate-500 font-medium">Enter your credentials to access your account</p>
    </div>

    <form action="{{ url_for('login') }}" method="POST" id="login-form" novalidate class="space-y-6">
      <!-- Email Input -->
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2" id="label-email">Email
          Address</label>
        <input type="email" name="email" id="email"
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
          placeholder="name@iitbhilai.ac.in" required autocomplete="email" aria-labelledby="label-email">
      </div>

      <!-- Password Input -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <label for="password" class="block text-sm font-semibold text-slate-700" id="label-password">Password</label>
          <a href="{{ url_for('forgot_password') }}"
            class="text-sm font-medium text-primary hover:text-indigo-700 transition"
            id="forgot-password-link">Forgot?</a>
        </div>
        <input type="password" name="password" id="password"
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
          placeholder="••••••••" required autocomplete="current-password" aria-labelledby="label-password">
      </div>

      <!-- Submit Button -->
      <button type="submit"
        class="w-full bg-primary hover:bg-indigo-600 text-white font-bold rounded-xl px-4 py-3 shadow-md shadow-indigo-200 transition"
        id="login-submit-btn">
        Sign In
      </button>
    </form>

    <div class="text-center mt-6 text-slate-500 font-medium text-sm">
      <p>Don't have an account? <a href="{{ url_for('signup') }}"
          class="text-primary hover:text-indigo-700 font-bold transition" id="signup-link">Sign Up</a></p>
    </div>
  </div>
</div>
{% endblock %}
