{% extends "base.html" %}

{% block title %}Sign In - 🔗 LostLinks{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="bg-white rounded-[24px] shadow-xl p-8 md:p-12 w-full max-w-md border border-slate-100">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800 mb-2" id="login-title">Sign In</h1>
      <p class="text-slate-500 font-medium">Enter your credentials to access your account</p>
    </div>

    <form action="{{ url_for('login') }}" method="POST" id="login-form" novalidate class="space-y-6">
      <!-- Email Input -->
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2" id="label-email">Email Address</label>
        <input 
          type="email" 
          name="email" 
          id="email" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" 
          placeholder="name@iitbhilai.ac.in" 
          required 
          autocomplete="email"
          aria-labelledby="label-email"
        >
      </div>

      <!-- Password Input -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <label for="password" class="block text-sm font-semibold text-slate-700" id="label-password">Password</label>
          <a href="{{ url_for('forgot_password') }}" class="text-sm font-medium text-primary hover:text-indigo-700 transition" id="forgot-password-link">Forgot?</a>
        </div>
        <input 
          type="password" 
          name="password" 
          id="password" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" 
          placeholder="••••••••" 
          required 
          autocomplete="current-password"
          aria-labelledby="label-password"
        >
      </div>

      <!-- Submit Button -->
      <button type="submit" class="w-full bg-primary hover:bg-indigo-600 text-white font-bold rounded-xl px-4 py-3 shadow-md shadow-indigo-200 transition" id="login-submit-btn">
        Sign In
      </button>
    </form>

    <div class="text-center mt-6 text-slate-500 font-medium text-sm">
      <p>Don't have an account? <a href="{{ url_for('signup') }}" class="text-primary hover:text-indigo-700 font-bold transition" id="signup-link">Sign Up</a></p>
    </div>
  </div>
</div>
{% endblock %}
