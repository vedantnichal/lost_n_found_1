<!-- Reusable Leaflet.js Campus Map Component -->

<div class="space-y-3">
  <label for="location" class="block text-sm font-semibold text-slate-700">
    {{ map_label | default('Location') }}
  </label>

  <div class="relative">
    <input type="text" name="location" id="location" readonly
      class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition cursor-pointer font-medium"
      placeholder="{{ map_placeholder | default('Click to select location on map...') }}"
      value="{{ item.location if item else '' }}" required
      onclick="openPickerModal()" onfocus="openPickerModal()">
    <button type="button" onclick="openPickerModal()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition text-lg focus:outline-none" title="Open Map Selector">
      📍
    </button>
  </div>
  <p class="text-xs text-slate-400 mt-1 font-semibold">Click the input or pin icon 📍 to select coordinates on the campus map.</p>

  <!-- Map Picker Modal -->
  <div id="map-picker-modal" class="fixed inset-0 hidden items-center justify-center p-4 backdrop-blur-md transition-all duration-300 opacity-0" style="z-index: 100; background-color: rgba(15, 23, 42, 0.6);" role="dialog" aria-modal="true">
    <div id="map-picker-modal-card" class="bg-white rounded-[24px] shadow-2xl border border-slate-100 w-full max-w-5xl overflow-hidden transform scale-95 transition-all duration-300">
      
      <!-- Modal Header -->
      <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
        <div class="flex items-center gap-2">
          <span class="text-xl">🗺️</span>
          <div>
            <h3 class="font-bold text-slate-800 text-base">Select Location</h3>
            <p class="text-xs text-slate-400 font-medium">Click on the map or choose a landmark, then specify details</p>
          </div>
        </div>
        <button type="button" onclick="closePickerModal()" class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 w-8 h-8 rounded-full flex items-center justify-center transition focus:outline-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Modal Body (Map & Details Grid) -->
      <div class="grid grid-cols-1 lg:grid-cols-12 w-full">
        <!-- Left: Leaflet Map (Col span 7) -->
        <div class="lg:col-span-7 relative border-r border-slate-100">
          <div id="map" class="w-full" style="height: 480px; min-height: 480px; position: relative;"></div>
        </div>

        <!-- Right: Location Details Sidebar (Col span 5) -->
        <div class="lg:col-span-5 flex flex-col bg-slate-50/30 h-[480px] overflow-y-auto p-5 space-y-4">
          <!-- Selected Location Status -->
          <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm">
            <div class="flex items-center justify-between mb-2">
              <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                <span id="picker-map-status-dot" class="w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse"></span>
                Selected Location:
              </span>
            </div>
            <div id="picker-selected-value" class="text-sm font-extrabold text-indigo-600 break-words select-all">None</div>
          </div>

          <!-- Floor Selector Section -->
          <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm" id="floor-section">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Select Floor / Area</label>
            <div class="flex flex-wrap gap-1.5" id="floor-pills">
              <!-- JS will generate pills -->
            </div>
          </div>

          <!-- Room / Office Selector Section -->
          <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm" id="room-section">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" id="room-label">Specific Room / Office</label>
            <!-- Custom Room Input -->
            <div class="relative">
              <input type="text" id="custom-room-input" 
                class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                placeholder="e.g. Room 304, Cafe, Library...">
            </div>
          </div>

          <!-- Quick Landmarks Selector (Scrollable) -->
          <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm flex-1 min-h-[160px]">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Quick Landmarks Selector</p>
            <div class="flex flex-wrap gap-1.5 max-h-[120px] overflow-y-auto pr-1" id="landmark-tags">
              <!-- JS will generate tags -->
            </div>
          </div>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="bg-slate-50 px-6 py-3 border-t border-slate-100 flex justify-end gap-2 text-xs">
        <button type="button" onclick="closePickerModal()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-4 py-2 rounded-xl transition">
          Cancel
        </button>
        <button type="button" onclick="confirmPickerLocation()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-xl transition shadow-md shadow-indigo-100">
          Confirm Location
        </button>
      </div>
    </div>
  </div>
</div>

    const landmarks = [
      { name: "Hostel Kanhar", coords: [21.2448, 81.3219], radius: 25 },

      { name: "LDC", coords: [21.24643, 81.31966], radius: 25 },
      { name: "Shopping Complex", coords: [21.24178, 81.31345], radius: 25 },
      { name: "CPF", coords: [21.24780, 81.31793], radius: 15 },
      { name: "Basketball/Volleyball Court Area", coords: [21.24613, 81.32187], radius: 30 },
      { name: "Cricket/Football Ground", coords: [21.24711, 81.32187], radius: 55 },
      { name: "Gate 1", coords: [21.24605, 81.31322], radius: 15 },
      { name: "Gate 2", coords: [21.23965, 81.3201], radius: 15 },
    ];

    // Utility distance function (Haversine formula)
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6370e3; // meters
      const phi1 = lat1 * Math.PI / 180;
      const phi2 = lat2 * Math.PI / 180;
      const deltaPhi = (lat2 - lat1) * Math.PI / 180;
      const deltaLambda = (lon2 - lon1) * Math.PI / 180;

      const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
        Math.cos(phi1) * Math.cos(phi2) *
        Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    // Set status dot color
    const isLost = window.location.pathname.includes('lost') || document.getElementById('report-lost-title') !== null;
    const themeColor = isLost ? '#f43f5e' : '#10b981';
    const statusDot = document.getElementById('picker-map-status-dot');
    if (statusDot) {
      statusDot.style.backgroundColor = themeColor;
    }

    function getSublocationsForLandmark(landmarkName) {
      const cleanName = landmarkName ? landmarkName.trim() : "";
      const matchKey = Object.keys(landmarkSubLocations).find(
        key => {
          const normClean = cleanName.toLowerCase().replace(/[^a-z0-9]/g, '');
          const normKey = key.toLowerCase().replace(/[^a-z0-9]/g, '');
          return normClean.includes(normKey) || normKey.includes(normClean);
        }
      );
      return matchKey ? landmarkSubLocations[matchKey] : [];
    }

    // Parse existing location string
    function parseExistingLocation(val) {
      let base = val;
      let floor = "N/A";
      let room = "";

      const lastParenMatch = val.match(/\s*\(([^)]+)\)$/);
      if (lastParenMatch) {
        const inner = lastParenMatch[1];
        // If it is not coordinates (doesn't match lat/lng comma pattern)
        if (!inner.match(/^-?\d+\.\d+,\s*-?\d+\.\d+$/)) {
          base = val.substring(0, lastParenMatch.index).trim();
          const parts = inner.split(/\s*-\s*/);
          if (parts.length === 2) {
            floor = parts[0].trim();
            room = parts[1].trim();
          } else if (parts.length === 1) {
            const matchedLandmark = getLandmarkFromBase(base);
            const subFloors = getSublocationsForLandmark(matchedLandmark);
            const matchedTag = subFloors.find(f => f.toLowerCase() === parts[0].trim().toLowerCase());
            if (matchedTag) {
              floor = matchedTag;
            } else {
              room = parts[0].trim();
            }
          }
        }
      }
      return { base, floor, room };
    }

    function getLandmarkFromBase(base) {
      if (!base) return "";
      const match = landmarks.find(l => base.toLowerCase().includes(l.name.toLowerCase()));
      return match ? match.name : "";
    }

    function renderFloorPills(landmarkName) {
      floorPillsContainer.innerHTML = '';
      const subFloors = getSublocationsForLandmark(landmarkName);
      
      const floorSection = document.getElementById('floor-section');
      if (subFloors.length === 0) {
        if (floorSection) floorSection.classList.add('hidden');
        return;
      }
      if (floorSection && isDirectLandmark(selectedBaseLocation)) {
        floorSection.classList.remove('hidden');
      }

      subFloors.forEach(floor => {
        const pill = document.createElement('button');
        pill.type = 'button';
        pill.className = `px-3 py-1.5 rounded-xl border text-[11px] font-bold transition-all duration-200 ${
          selectedFloor === floor 
            ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' 
            : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50 shadow-sm'
        }`;
        pill.textContent = floor;
        pill.addEventListener('click', () => {
          if (selectedFloor === floor) {
            selectedFloor = "N/A";
          } else {
            selectedFloor = floor;
          }
          renderFloorPills(landmarkName);
          updatePickerSelectedValue();
        });
        floorPillsContainer.appendChild(pill);
      });

      // Add N/A option
      const naPill = document.createElement('button');
      naPill.type = 'button';
      naPill.className = `px-3 py-1.5 rounded-xl border text-[11px] font-bold transition-all duration-200 ${
        selectedFloor === "N/A" 
          ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' 
          : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50 shadow-sm'
      }`;
      naPill.textContent = "N/A";
      naPill.addEventListener('click', () => {
        selectedFloor = "N/A";
        renderFloorPills(landmarkName);
        updatePickerSelectedValue();
      });
      floorPillsContainer.appendChild(naPill);
    }

    customRoomInput.addEventListener('input', (e) => {
      selectedRoom = e.target.value.trim();
      updatePickerSelectedValue();
    });

    function isDirectLandmark(base) {
      if (!base) return false;
      return landmarks.some(l => base.trim().toLowerCase() === l.name.trim().toLowerCase());
    }

    function updateDetailsVisibility() {
      const floorSection = document.getElementById('floor-section');
      const roomSection = document.getElementById('room-section');
      if (!floorSection || !roomSection) return;

      const isInside = isDirectLandmark(selectedBaseLocation);
      if (isInside) {
        const matchedLandmark = getLandmarkFromBase(selectedBaseLocation);
        const subFloors = getSublocationsForLandmark(matchedLandmark);
        if (subFloors.length > 0) {
          floorSection.classList.remove('hidden');
        } else {
          floorSection.classList.add('hidden');
          selectedFloor = "N/A";
        }
        roomSection.classList.remove('hidden');
      } else {
        floorSection.classList.add('hidden');
        roomSection.classList.add('hidden');
        // Clear selected details when not in a building
        selectedFloor = "N/A";
        selectedRoom = "";
        customRoomInput.value = "";
      }
    }

    function updatePickerSelectedValue() {
      if (!selectedBaseLocation) {
        tempSelectedLocation = "";
        pickerSelectedValue.textContent = "None";
        pickerSelectedValue.className = "text-sm font-extrabold text-slate-400";
        return;
      }

      let extraDetails = [];
      const isInside = isDirectLandmark(selectedBaseLocation);
      if (isInside) {
        if (selectedFloor && selectedFloor !== "N/A") {
          extraDetails.push(selectedFloor);
        }
        if (selectedRoom) {
          extraDetails.push(selectedRoom);
        }
      }

      if (extraDetails.length > 0) {
        tempSelectedLocation = `${selectedBaseLocation} (${extraDetails.join(' - ')})`;
      } else {
        tempSelectedLocation = selectedBaseLocation;
      }

      pickerSelectedValue.textContent = tempSelectedLocation;
      pickerSelectedValue.className = "text-sm font-extrabold text-indigo-600 break-words select-all";
    }

    window.openPickerModal = function() {
      pickerModal.classList.remove('hidden');
      pickerModal.classList.add('flex');
      
      // Initialize map on first open
      if (!map) {
        initializePickerMap();
      }

      setTimeout(() => {
        pickerModal.classList.remove('opacity-0');
        pickerModal.classList.add('opacity-100');
        pickerCard.classList.remove('scale-95');
        pickerCard.classList.add('scale-100');
      }, 10);

      // Invalidate map size to make sure it loads tiles correctly
      setTimeout(() => {
        if (map) {
          map.invalidateSize();
          
          // Preload existing value into map if exists
          const val = locationInput.value;
          if (val) {
            const parsed = parseExistingLocation(val);
            selectedBaseLocation = parsed.base;
            selectedFloor = parsed.floor;
            selectedRoom = parsed.room;
            prevBaseLocation = selectedBaseLocation;

            customRoomInput.value = selectedRoom;
            const matchedLandmark = getLandmarkFromBase(selectedBaseLocation);
            renderFloorPills(matchedLandmark);
            updateDetailsVisibility();
            updatePickerSelectedValue();
            
            // Try matching coordinates or landmarks to place pin
            const match = landmarks.find(l => selectedBaseLocation.toLowerCase().includes(l.name.toLowerCase()));
            if (match) {
              map.setView(match.coords, 20);
              placePin(match.coords[0], match.coords[1]);
            } else {
              const coordsRegex = /(-?\d+\.\d+),\s*(-?\d+\.\d+)/;
              const found = selectedBaseLocation.match(coordsRegex);
              if (found) {
                const lat = parseFloat(found[1]);
                const lng = parseFloat(found[2]);
                map.setView([lat, lng], 20);
                placePin(lat, lng);
              }
            }
          } else {
            selectedBaseLocation = "";
            selectedFloor = "N/A";
            selectedRoom = "";
            prevBaseLocation = "";
            customRoomInput.value = "";
            renderFloorPills("");
            updateDetailsVisibility();
            updatePickerSelectedValue();
          }
        }
      }, 310);
    };

    window.closePickerModal = function() {
      pickerModal.classList.remove('opacity-100');
      pickerModal.classList.add('opacity-0');
      pickerCard.classList.remove('scale-100');
      pickerCard.classList.add('scale-95');
      setTimeout(() => {
        pickerModal.classList.remove('flex');
        pickerModal.classList.add('hidden');
      }, 300);
    };

    window.confirmPickerLocation = function() {
      if (tempSelectedLocation) {
        locationInput.value = tempSelectedLocation;
        // Interactive UI flash feedback on input field
        locationInput.classList.add('ring-2', 'ring-primary', 'border-transparent');
        setTimeout(() => {
          locationInput.classList.remove('ring-2', 'ring-primary', 'border-transparent');
        }, 600);
      }
      closePickerModal();
    };

    function initializePickerMap() {
      const southWest = L.latLng(21.238, 81.311);
      const northEast = L.latLng(21.247, 81.324);
      const campusBounds = L.latLngBounds(southWest, northEast);

      map = L.map('map', {
        center: campusCenter,
        zoom: 17,
        minZoom: 16,
        maxZoom: 20,
        maxBounds: campusBounds,
        maxBoundsViscosity: 1.0,
        zoomControl: true,
        scrollWheelZoom: true
      });

      map.attributionControl.setPrefix('📌 IIT Bhilai');

      const streetLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
        attribution: '&copy; Google Maps',
        maxZoom: 20
      });

      const satelliteHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        attribution: '&copy; Google Maps',
        maxZoom: 20
      });

      satelliteHybrid.addTo(map);

      L.control.layers({
        "Google Satellite (Hybrid)": satelliteHybrid,
        "Google Street View": streetLayer
      }, null, { position: 'topright' }).addTo(map);

      // Draw campus boundary circle
      L.circle(campusCenter, {
        color: themeColor,
        fillColor: themeColor,
        fillOpacity: 0.04,
        radius: 800,
        weight: 2.5,
        dashArray: '6, 6',
        interactive: false
      }).addTo(map);

      const createSvgIcon = (color, size = 12, borderSize = 2.5) => {
        return L.divIcon({
          className: 'custom-map-marker',
          html: `<div style="background-color: ${color}; width: ${size}px; height: ${size}px; border-radius: 50%; border: ${borderSize}px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3); transform: translate(-2px, -2px);"></div>`,
          iconSize: [size, size],
          iconAnchor: [size / 2, size / 2]
        });
      };

      const landmarkIcon = createSvgIcon('#6366f1', 12, 2.5);
      const tagsContainer = document.getElementById('landmark-tags');

      landmarks.forEach(landmark => {
        const lMarker = L.marker(landmark.coords, { icon: landmarkIcon }).addTo(map);
        lMarker.bindTooltip(landmark.name, { permanent: false, direction: 'top' });

        lMarker.on('click', function () {
          selectCoordinates(landmark.coords[0], landmark.coords[1], landmark.name);
        });

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'px-3 py-1.5 bg-white hover:bg-slate-100 text-slate-700 text-xs font-semibold rounded-xl border border-slate-200 shadow-sm transition-all duration-200 hover:border-slate-300 active:scale-95 flex items-center gap-1';
        btn.innerHTML = `<span>📍</span><span>${landmark.name}</span>`;
        btn.addEventListener('click', () => {
          map.setView(landmark.coords, 20);
          selectCoordinates(landmark.coords[0], landmark.coords[1], landmark.name);
        });
        tagsContainer.appendChild(btn);
      });

      // Click on map to place pin
      map.on('click', function (e) {
        selectCoordinates(e.latlng.lat, e.latlng.lng);
      });

      function placePin(lat, lng) {
        const selectedIcon = createSvgIcon(themeColor, 16, 3);
        if (selectedMarker) {
          selectedMarker.setLatLng([lat, lng]);
        } else {
          selectedMarker = L.marker([lat, lng], { icon: selectedIcon }).addTo(map);
        }
      }

      function selectCoordinates(lat, lng, name = null) {
        // Validate coordinates bounds
        const distFromCenter = calculateDistance(lat, lng, campusCenter[0], campusCenter[1]);
        if (distFromCenter > 1000) {
          pickerSelectedValue.textContent = "Outside campus bounds!";
          pickerSelectedValue.className = "text-xs font-bold text-rose-500";
          setTimeout(() => {
            updatePickerSelectedValue();
          }, 2000);
          return;
        }

        placePin(lat, lng);

        let newBase = "";
        if (name) {
          newBase = name;
        } else {
          // Calculate distance to all landmarks
          const landmarkDistances = landmarks.map(l => {
            const dist = calculateDistance(lat, lng, l.coords[0], l.coords[1]);
            return { landmark: l, distance: dist };
          });

          // Sort by distance ascending
          landmarkDistances.sort((a, b) => a.distance - b.distance);

          const nearest = landmarkDistances[0].landmark;
          const nearestDist = landmarkDistances[0].distance;

          // 1. Direct Match Check
          if (nearestDist < nearest.radius) {
            newBase = nearest.name;
            selectedMarker.setLatLng(nearest.coords);
          } else {
            const secondNearest = landmarkDistances[1] ? landmarkDistances[1].landmark : null;
            const secondNearestDist = landmarkDistances[1] ? landmarkDistances[1].distance : Infinity;

            const nearestNearThreshold = nearest.radius * 2.5;

            // 2. Between Logic: if click is within near threshold of both, and distances are close
            if (secondNearest && nearestDist < nearestNearThreshold && secondNearestDist < secondNearest.radius * 2.5 && Math.abs(nearestDist - secondNearestDist) < 25) {
              newBase = `Between ${nearest.name} and ${secondNearest.name} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
            }
            // 3. Near Logic
            else if (nearestDist < nearestNearThreshold) {
              newBase = `Near ${nearest.name} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
            }
            // 4. Default Campus Area
            else {
              newBase = `Campus Area (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
            }
          }
        }

        selectedBaseLocation = newBase;
        const oldLandmark = getLandmarkFromBase(prevBaseLocation);
        const newLandmark = getLandmarkFromBase(selectedBaseLocation);
        if (oldLandmark !== newLandmark) {
          selectedFloor = "N/A";
          selectedRoom = "";
          customRoomInput.value = "";
        }
        prevBaseLocation = selectedBaseLocation;

        renderFloorPills(newLandmark);
        updateDetailsVisibility();
        updatePickerSelectedValue();
      }
    }
  });
</script>
