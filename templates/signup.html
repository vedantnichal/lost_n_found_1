{% extends "base.html" %}

{% block title %}Create Account - 🔗 LostLinks{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="bg-white rounded-[24px] shadow-xl p-8 md:p-12 w-full max-w-md border border-slate-100">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800 mb-2" id="signup-title">Create Account</h1>
      <p class="text-slate-500 font-medium">Sign up to start secure credentials workspace</p>
    </div>

    <form action="{{ url_for('signup') }}" method="POST" id="signup-form" novalidate class="space-y-5">
      <!-- Email Input -->
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2" id="label-email">Email Address</label>
        <input 
          type="email" 
          name="email" 
          id="email" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" 
          placeholder="name@iitbhilai.ac.in" 
          required 
          autocomplete="email"
          aria-labelledby="label-email"
        >
      </div>

      <!-- Password Input -->
      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700 mb-2" id="label-password">Password</label>
        <input 
          type="password" 
          name="password" 
          id="password" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" 
          placeholder="At least 8 characters" 
          required 
          autocomplete="new-password"
          aria-labelledby="label-password"
        >
      </div>

      <!-- Confirm Password Input -->
      <div>
        <label for="confirm_password" class="block text-sm font-semibold text-slate-700 mb-2" id="label-confirm-password">Confirm Password</label>
        <input 
          type="password" 
          name="confirm_password" 
          id="confirm_password" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" 
          placeholder="••••••••" 
          required 
          autocomplete="new-password"
          aria-labelledby="label-confirm-password"
        >
      </div>

      <!-- Submit Button -->
      <button type="submit" class="w-full bg-primary hover:bg-indigo-600 text-white font-bold rounded-xl px-4 py-3 mt-4 shadow-md shadow-indigo-200 transition" id="signup-submit-btn">
        Create Account
      </button>
    </form>

    <div class="text-center mt-6 text-slate-500 font-medium text-sm">
      <p>Already have an account? <a href="{{ url_for('login') }}" class="text-primary hover:text-indigo-700 font-bold transition" id="login-link">Sign In</a></p>
    </div>
  </div>
</div>
{% endblock %}
