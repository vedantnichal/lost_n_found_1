{% extends "base.html" %}

{% block title %}Update Profile - 🔗 LostLinks{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="animate-fade-in-up bg-white rounded-[24px] shadow-xl p-8 md:p-12 w-full max-w-lg border border-slate-100">
    
    <div class="mb-8 text-center border-b border-slate-100 pb-6">
      <h1 class="text-3xl font-bold text-slate-800 mb-2" id="profile-title">Update Profile</h1>
      <p class="text-slate-500 font-medium">Update your account information</p>
    </div>

    {% if user %}
    <form action="{{ url_for('update_profile') }}" method="POST" id="update-profile-form" class="space-y-6">
      <!-- Display Name Input -->
      <div>
        <label for="displayName" class="block text-sm font-semibold text-slate-700 mb-2">Display Name</label>
        <input 
          type="text" 
          id="displayName" 
          name="displayName" 
          value="{{ user.displayName }}" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" 
          required
        >
      </div>

      <!-- Email Input (Readonly) -->
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          value="{{ user.email }}" 
          class="w-full bg-slate-100 border border-slate-200 text-slate-500 cursor-not-allowed rounded-xl px-4 py-3" 
          readonly
        >
        <p class="text-xs text-slate-400 mt-1 ml-1">Email cannot be changed.</p>
      </div>

      <!-- Contact Number Input -->
      <div>
        <label for="contactNumber" class="block text-sm font-semibold text-slate-700 mb-2">Contact Number</label>
        <input 
          type="text" 
          id="contactNumber" 
          name="contactNumber" 
          value="{{ user.contactNumber }}" 
          class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
        >
      </div>

      <div class="flex flex-col sm:flex-row gap-4 mt-8 pt-4 w-full">
        <button type="submit" id="update-profile-submit-btn" class="flex-1 flex items-center justify-center text-center bg-primary hover:bg-indigo-600 text-white font-bold rounded-xl px-4 py-3 shadow-md shadow-indigo-200 transition">
          Save Changes
        </button>
        <a href="{{ url_for('profile') }}" class="flex-1 flex items-center justify-center text-center bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl px-4 py-3 transition">
          Cancel
        </a>
      </div>
    </form>
    <script>
    document.getElementById('update-profile-form').addEventListener('submit', function() {
        const submitBtn = document.getElementById('update-profile-submit-btn');
        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.innerText = 'Saving...';
        }
    });
    </script>
    {% else %}
      <div class="text-center text-slate-500 font-medium py-10 bg-slate-50 rounded-xl border border-slate-100">
        User profile not found.
      </div>
    {% endif %}

  </div>
</div>
{% endblock %}
